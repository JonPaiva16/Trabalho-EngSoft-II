name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    # ATENCAO: todo o codigo do projeto vive dentro da pasta
    # "projeto-final-es-main" (nao na raiz do repositorio). Por isso
    # toda etapa abaixo roda com working-directory apontando pra ela.
    defaults:
      run:
        working-directory: projeto-final-es-main

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: projeto-final-es-main/requirements.txt

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint

      - name: Rodar pylint (nota minima 7.0/10)
        run: pylint app --fail-under=7.0

      - name: Rodar pytest com cobertura (minimo 70%)
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=70
